<!DOCTYPE html>
<html lang="sv-SE">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ampy Testimonials — preview (levererade filer)</title>

<!-- Standalone-preview: temat saknas lokalt, så vi förser det som Ampys Bricks-tema
     normalt ger globalt (Outfit + html 62.5% + tokens). I PRODUKTION laddas inget av
     detta av blocket — det ärvs från temat. Blockets egna filer nedan rör aldrig html/body. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/splide.min.css">
<style>
  /* Endast för standalone-preview (motsvarar temat) — INTE del av leveransen */
  html { font-size: 62.5%; }
  body { margin: 0; background: var(--color-2, hsl(216 100% 98%)); }
</style>

<!-- === LEVERANSFIL 1/3: blockets CSS (by reference) === -->
<link rel="stylesheet" href="ampy-testimonials.css">
</head>
<body>

<!--
  SERVER-RENDERAD MARKUP (motsvarar exakt ampy-testimonials.php:s utdata).
  ul.splide__list börjar tom här; card-byggaren nedan fyller den = PHP-substitut
  för lokal preview. I produktion renderar PHP:en korten direkt i HTML:en.
-->
<section class="ampy-testimonials" aria-label="Omdömen från Ampys kunder">
  <div class="ampy-testimonials__inner">
    <header class="att-head">
      <h2 class="att-heading">Vad säger dina grannar om Ampy?</h2>
      <p class="att-sub">Riktiga omdömen från riktiga jobb.</p>
    </header>
    <div class="att-slider splide" aria-label="Kundomdömen">
      <div class="splide__track"><ul class="splide__list"></ul></div>
    </div>
    <div class="att-nav" role="group" aria-label="Bläddra bland omdömen"></div>
    <div class="att-rating">
      <a class="att-badge" href="https://www.google.com/maps/place/Ampy/@59.3576299,17.9842061,17z/data=!3m1!4b1!4m6!3m5!1s0x2bec1ce5c4ed9ce9:0xfce1752e84a1bfee!8m2!3d59.3576272!4d17.986781!16s%2Fg%2F11ypjy9rrm"
         target="_blank" rel="noopener noreferrer" aria-label="Läs Ampys omdömen på Google, öppnas i ny flik">
        <span class="att-badge__stars" role="img" aria-label="5 av 5 stjärnor">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.9 1.6-7L2 9.2l7.1-.6z"/></svg>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.9 1.6-7L2 9.2l7.1-.6z"/></svg>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.9 1.6-7L2 9.2l7.1-.6z"/></svg>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.9 1.6-7L2 9.2l7.1-.6z"/></svg>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.9 1.6-7L2 9.2l7.1-.6z"/></svg>
        </span>
        <span class="att-badge__text"><strong>5 av 5</strong>Betyg på Google</span>
      </a>
    </div>
  </div>
</section>

<!-- PHP-substitut: renderar de 12 korten in i ul.splide__list (server-render lokalt). -->
<script>
(function () {
  var REVIEWS = [
    { name: "Filip Eriksson", text: "Blev rekommenderad av en granne att gå via Ampy. Är otroligt nöjd med det valet.", date: "mars 2026" },
    { name: "Jan Fernström", text: "Ampy visade sig i konkurrens med andra aktörer både kunnigare och billigare. Genomförandet av offererat arbete skedde inom utlovad tid snabbt och utan problem. Följdfrågor som uppstått efter en tids användning har besvarats kunnigt och utan dröjsmål.", date: "juni 2026" },
    { name: "Daniel Hellström", text: "Professionell firma! Oskar gjorde ett kanonjobb på uppfarten, var en annan firma här tidigare men dem klarade inte av det.", date: "mars 2026" },
    { name: "Mohammed Abduljaleel", text: "Kan verkligen rekommendera Ampy. Trevlig kontakt, punktliga och noggranna. Arbetet blev riktigt bra och priset var rimligt. Kommer definitivt att anlita dom igen i framtiden.", date: "juni 2026" },
    { name: "Alexandra Kamona", text: "Vi är supernöjda med de som installerade vår elbox! Väldigt proffsiga och trevliga att ha att göra med. Rekommenderas varmt!", date: "maj 2026" },
    { name: "Mathias Franzen", text: "Sökte en helhetslösning för hembatteri. Ampy levererade över förväntan. Snabbt, smidigt och tryggt!", date: "mars 2026" },
    { name: "Moa Olaussen", text: "Snabb hjälp när elcentralen strulade. Ampy dök upp direkt och löste allt med högsta precision. Rekommenderas!", date: "mars 2026" },
    { name: "Sofia Hamren", text: "Jättebra och professionell service! Elektrikern förstod direkt vad som behövde göras och utförde arbetet effektivt och med mycket bra resultat. Rekommenderas!", date: "april 2026" },
    { name: "Hugo Grafström Olsson", text: "Från start till mål levererades en service i världsklass!", date: "mars 2026" },
    { name: "Josephine Lundqvist", text: "Fick hjälp med belysningen i hela lägenheten under min renovering. Väldigt nöjd.", date: "maj 2026" },
    { name: "dany Hanna", text: "Supernöjd, bra gäng, trevliga pålitliga och snabba.", date: "juni 2026" },
    { name: "Adam Andersson", text: "Proffsig rådgivning inför vår installation. Känns tryggt att anlita experter.", date: "mars 2026" }
  ];
  var STAR = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.9 1.6-7L2 9.2l7.1-.6z"/></svg>';
  function esc(s){ var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
  document.querySelector('.att-slider .splide__list').innerHTML = REVIEWS.map(function (r) {
    return '<li class="splide__slide"><figure class="att-card">'
      + '<div class="att-card__top"><span class="att-card__quote" aria-hidden="true">“</span>'
      + '<img class="att-card__google" src="assets/google-g.svg" alt="Google-omdöme" width="22" height="22"></div>'
      + '<div class="att-card__body"><blockquote class="att-card__text">' + esc(r.text) + '</blockquote></div>'
      + '<figcaption class="att-card__foot"><div class="att-card__name">' + esc(r.name) + '</div>'
      + '<hr class="att-card__divider">'
      + '<div class="att-card__meta"><span class="att-card__stars" role="img" aria-label="5 av 5 stjärnor">' + STAR.repeat(5) + '</span>'
      + '<span class="att-card__date">' + esc(r.date) + '</span></div></figcaption></figure></li>';
  }).join('');
})();
</script>

<!-- === LEVERANSFIL 2/3: Splide (v4) === -->
<script src="assets/splide.min.js"></script>
<!-- === LEVERANSFIL 3/3: blockets JS (by reference) — FÖRHÖJER markupen ovan === -->
<script src="ampy-testimonials.js"></script>
</body>
</html>
