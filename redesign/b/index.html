<!DOCTYPE html>
<html lang="sv-SE">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ampy Testimonials — Version B: Proof-först</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/splide.css">
<style>
/* ============================================================
   VERSION B — "Proof-först"
   Aggregatet ÖVERST: kicker-pill (Google) + rubrik + proof-strip
   med synligt ofyllda [GAP]-siffror (X,X av 5 · XXX omdömen) som
   INTE går att råka shippa som "riktiga".
   Kortet: initial-avatar + namn/datum-huvud, citat, stjärnfot.
   Mjuk CTA under: "Boka en elektriker" → /offert/.
   Fraktionsräknare (ärlig position) i stället för prickar.
   ⚑ [GAP] Datum + aggregatsiffror behöver ägar-bekräftelse.
   ============================================================ */
html { font-size: 62.5%; box-sizing: border-box; }
*, *::before, *::after { box-sizing: inherit; }
body {
  margin: 0;
  font-family: 'Outfit', sans-serif;
  font-weight: 300;
  font-size: var(--aptext-sm);
  background: var(--color-2, hsl(216 100% 98%));
  color: var(--apmidnight-blue);
  -webkit-font-smoothing: antialiased;
}

.testimonial-b { padding: var(--apspace-2xl) var(--apspace-m); overflow: hidden; }
.testimonial-b__inner { max-width: 1200px; margin: 0 auto; }

/* --- Kicker + rubrik + proof-strip --- */
.testimonial-b__header { text-align: center; max-width: 78rem; margin: 0 auto var(--apspace-l); }
.testimonial-b__kicker {
  display: inline-flex; align-items: center; gap: 0.8rem;
  padding: 0.7rem 1.6rem;
  background: #fff; border-radius: var(--apradius-full);
  box-shadow: 0 2px 10px rgba(9, 11, 50, 0.07);
  font-size: var(--aptext-xs); font-weight: 600; letter-spacing: 0.12em;
  color: var(--color-5); text-transform: uppercase;
  margin-bottom: var(--apspace-s);
}
.testimonial-b__kicker img { width: 15px; height: 15px; }
.testimonial-b__heading {
  margin: 0 0 var(--apspace-s);
  font-size: var(--aptext-2xl);
  font-weight: 600;
  line-height: 1.15;
  color: var(--apmidnight-blue);
}
.testimonial-b__heading .hl {
  background: linear-gradient(90deg, var(--brightgreen), var(--color-5));
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
.testimonial-b__proofstrip {
  display: flex; align-items: center; justify-content: center; flex-wrap: wrap;
  gap: 1.2rem;
}
.testimonial-b__proofstrip .stars { display: inline-flex; gap: 0.3rem; }
.testimonial-b__proofstrip .stars svg { width: 18px; height: 18px; fill: var(--color-5); }
.testimonial-b__gapnum {
  font-size: var(--aptext-m); font-weight: 500; color: rgba(9, 11, 50, 0.85);
}
.testimonial-b__gapnum .gap {
  color: rgba(9, 11, 50, 0.35);
  border-bottom: 2px dashed rgba(9, 11, 50, 0.25);
  font-variant-numeric: tabular-nums;
}

/* --- Slider --- */
.testimonial-b .splide { padding-bottom: var(--apspace-xs); }
.card {
  display: flex; flex-direction: column;
  min-height: 320px; height: 100%;
  padding: var(--apspace-m);
  border-radius: var(--radius);
  background: linear-gradient(-27deg, #0b0f30 0%, #2d516d 60%);
  color: #fff;
  box-shadow: 0 0 16px 0 rgba(190, 190, 190, 0.14);
}
.card__head { display: flex; align-items: center; gap: 1.2rem; margin-bottom: var(--apspace-xs); }
.card__avatar {
  width: 4.4rem; height: 4.4rem; border-radius: var(--apradius-full);
  display: grid; place-items: center;
  background: linear-gradient(135deg, var(--apemerald-flow), var(--apteal-core));
  font-size: var(--aptext-ml); font-weight: 600; color: #fff;
  flex: 0 0 auto;
}
.card__who { min-width: 0; }
.card__name { margin: 0; font-size: var(--aptext-m); font-weight: 600; line-height: 1.2; }
.card__date { margin: 0.2rem 0 0; font-size: var(--aptext-xs); font-weight: 300; color: rgba(255, 255, 255, 0.6); }
.card__google { margin-left: auto; width: 20px; height: 20px; flex: 0 0 auto; }
.card__text {
  margin: 0;
  font-size: var(--aptext-m); font-weight: 300; line-height: 1.55;
  color: rgba(255, 255, 255, 0.94);
}
.card__spacer { flex: 1 1 auto; min-height: var(--apspace-s); }
.card__foot { display: flex; align-items: center; gap: 0.8rem; }
.card__stars { display: inline-flex; gap: 0.3rem; }
.card__stars svg { width: 15px; height: 15px; fill: var(--apneon-mint); }
.card__score { font-size: var(--aptext-s); font-weight: 500; color: rgba(255, 255, 255, 0.85); }

/* --- Ärlig fraktionsräknare + pilar --- */
.testimonial-b__nav {
  display: flex; align-items: center; justify-content: center;
  gap: var(--apspace-s); margin-top: var(--apspace-s);
}
.testimonial-b__arrow {
  width: 4.4rem; height: 4.4rem; border-radius: var(--apradius-full);
  border: 1px solid rgba(9, 11, 50, 0.14); background: #fff;
  display: grid; place-items: center; cursor: pointer;
  transition: border-color .2s ease, box-shadow .2s ease;
}
.testimonial-b__arrow:hover { border-color: var(--apteal-core); box-shadow: 0 2px 10px rgba(9, 11, 50, 0.08); }
.testimonial-b__arrow svg { width: 16px; height: 16px; stroke: var(--apmidnight-blue); fill: none; stroke-width: 2.4; }
.testimonial-b__fraction {
  font-size: var(--aptext-sm); font-weight: 500;
  font-variant-numeric: tabular-nums;
  color: rgba(9, 11, 50, 0.7); min-width: 6ch; text-align: center;
}

/* --- Mjuk CTA --- */
.testimonial-b__cta { text-align: center; margin-top: var(--apspace-l); }
.testimonial-b__btn {
  display: inline-flex; align-items: center; gap: 1rem;
  padding: 1.4rem 2.8rem;
  border-radius: var(--apradius-full);
  background: linear-gradient(90deg, var(--apemerald-flow), var(--apteal-core));
  color: #fff; font-size: var(--aptext-m); font-weight: 500;
  text-decoration: none;
  box-shadow: 0 6px 20px rgba(0, 169, 145, 0.25);
  transition: transform .2s ease, box-shadow .2s ease;
}
.testimonial-b__btn:hover { transform: translateY(-2px); box-shadow: 0 10px 26px rgba(0, 169, 145, 0.32); }
.testimonial-b__btn svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2.4; }
.testimonial-b__ctatext { margin: var(--apspace-2xs) 0 0; font-size: var(--aptext-s); color: rgba(9, 11, 50, 0.6); }

@media (max-width: 820px) {
  .testimonial-b { padding: var(--apspace-xl) var(--apspace-s); }
  .testimonial-b__heading { font-size: var(--aptext-xl); }
  .card { min-height: 300px; }
}
</style>
</head>
<body>

<section class="testimonial-b" aria-label="Omdömen från Ampys kunder">
  <div class="testimonial-b__inner">

    <header class="testimonial-b__header">
      <span class="testimonial-b__kicker"><img src="../shared/google-g.svg" alt="">Omdömen från Google</span>
      <h2 class="testimonial-b__heading">Grannar i <span class="hl">hela Sverige</span> har redan valt Ampy</h2>
      <div class="testimonial-b__proofstrip">
        <span class="stars" role="img" aria-label="Femstjärniga omdömen">
          <svg viewBox="0 0 24 24"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.9 1.6-7L2 9.2l7.1-.6z"/></svg>
          <svg viewBox="0 0 24 24"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.9 1.6-7L2 9.2l7.1-.6z"/></svg>
          <svg viewBox="0 0 24 24"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.9 1.6-7L2 9.2l7.1-.6z"/></svg>
          <svg viewBox="0 0 24 24"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.9 1.6-7L2 9.2l7.1-.6z"/></svg>
          <svg viewBox="0 0 24 24"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.9 1.6-7L2 9.2l7.1-.6z"/></svg>
        </span>
        <!-- ⚑ [GAP] Medvetet OFYLLDA siffror: fylls först när ägaren bekräftat aggregatet -->
        <span class="testimonial-b__gapnum"><span class="gap">X,X</span> av 5 · <span class="gap">XXX</span> omdömen</span>
      </div>
    </header>

    <div class="splide" id="review-slider" aria-label="Kundomdömen">
      <div class="splide__track">
        <ul class="splide__list"><!-- slides injiceras av JS --></ul>
      </div>
    </div>

    <div class="testimonial-b__nav">
      <button class="testimonial-b__arrow" id="prev" aria-label="Föregående omdöme">
        <svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg>
      </button>
      <span class="testimonial-b__fraction" id="fraction" aria-live="polite">1 / 10</span>
      <button class="testimonial-b__arrow" id="next" aria-label="Nästa omdöme">
        <svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
      </button>
    </div>

    <div class="testimonial-b__cta">
      <a class="testimonial-b__btn" href="https://ampy.se/offert/">
        Boka en elektriker
        <svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </a>
      <p class="testimonial-b__ctatext">Alltid fast pris innan vi börjar.</p>
    </div>

  </div>
</section>

<script src="../shared/splide.min.js"></script>
<script>
/* Riktiga citat från ampy.se (Google-recensioner, ordagrant).
   ⚑ [GAP] date-fälten är PLATSHÅLLARE — ersätt med riktiga datum från Google-profilen. */
const REVIEWS = [
  { name: "Filip", text: "Blev rekommenderad av en granne att gå via Ampy. Är otroligt nöjd med det valet!", date: "juni 2026" },
  { name: "Thomas", text: "Behövde en elektriker för flera installationer hemma. Bra pris, snabb utryckning och hög kvalitet!", date: "juni 2026" },
  { name: "Daniel", text: "Professionell firma! Oskar gjorde ett kanonjobb på uppfarten, var en annan firma här tidigare men dem klarade inte av det.", date: "maj 2026" },
  { name: "Mathias", text: "Sökte en helhetslösning för hembatteri. Ampy levererade över förväntan. Snabbt, smidigt och tryggt!", date: "maj 2026" },
  { name: "Kristoffer", text: "Bästa elektrikern vi anlitat! Otroligt noggranna med detaljerna och städade till och med efter sig. Mycket nöjd kund.", date: "april 2026" },
  { name: "Adam", text: "Proffsig rådgivning inför vår installation. Känns tryggt att anlita experter.", date: "april 2026" },
  { name: "Moa", text: "Snabb hjälp när elcentralen strulade. Ampy dök upp direkt och löste allt med högsta precision. Rekommenderas!", date: "mars 2026" },
  { name: "Maria", text: "Hade hört gott om Ampy och de gjorde mig inte besviken. Kvalitet, transparens och bra pris i ett och samma paket!", date: "mars 2026" },
  { name: "Josephine", text: "Fick hjälp med belysningen i hela lägenheten under min renovering. Väldigt nöjd.", date: "februari 2026" },
  { name: "Sofia", text: "Jättebra och professionell service! Elektrikern förstod direkt vad som behövde göras och utförde arbetet effektivt och med mycket bra resultat.", date: "februari 2026" }
];

const STAR = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.9 1.6-7L2 9.2l7.1-.6z"/></svg>';
const list = document.querySelector('.splide__list');
list.innerHTML = REVIEWS.map(r => `
  <li class="splide__slide">
    <figure class="card" style="margin:0">
      <div class="card__head">
        <span class="card__avatar" aria-hidden="true">${r.name[0]}</span>
        <div class="card__who">
          <p class="card__name">${r.name}</p>
          <p class="card__date">${r.date}</p>
        </div>
        <img class="card__google" src="../shared/google-g.svg" alt="Google-omdöme">
      </div>
      <blockquote class="card__text" style="margin:0">${r.text}</blockquote>
      <span class="card__spacer"></span>
      <div class="card__foot">
        <span class="card__stars" role="img" aria-label="5 av 5 stjärnor">${STAR.repeat(5)}</span>
        <span class="card__score">5/5</span>
      </div>
    </figure>
  </li>`).join('');

const splide = new Splide('#review-slider', {
  type: 'slide', perPage: 3, perMove: 1, gap: '24px',
  autoplay: true, interval: 6000, speed: 500,
  pauseOnHover: true, rewind: true, arrows: false, pagination: false,
  mediaQuery: 'max',
  breakpoints: { 1024: { perPage: 2 }, 820: { perPage: 1 } }
}).mount();

const fraction = document.getElementById('fraction');
const update = () => { fraction.textContent = (splide.index + 1) + ' / ' + REVIEWS.length; };
splide.on('move', update); update();
document.getElementById('prev').addEventListener('click', () => splide.go('<'));
document.getElementById('next').addEventListener('click', () => splide.go('>'));
</script>
</body>
</html>
