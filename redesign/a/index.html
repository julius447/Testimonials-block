<!DOCTYPE html>
<html lang="sv-SE">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ampy Testimonials — Version A (final)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/splide.css">
<style>
/* ============================================================
   VERSION A — slutversion (ägar-feedback 2026-07-19, runda 4)
   Rubrik svart vikt 400 (mindre bold). Subline dold ≤759 (kompakt 1-upp).
   Citat centrerat, 17–19px. Badge = guldstjärnor + svart text, LÄNKAD till
   Google-profilen (ny flik). 12 äkta Google-recensioner (Jan Fernström #2).

   ANIMATION (rundan 4, efter robusthet/animations-granskning):
   - Progress-baren är NU en egen tunn linje under slidern, INTE på prickarna.
     Skäl: perMove=1 (byt 1 kort i taget, ägar-låst) gör att sid-pricken bara
     byter var 3:e slide (desktop), medan baren ska följa VARJE kortbyte.
     Linjen fylls 0→1 per autoplay-intervall och nollställs vid varje 'move'
     → "tid till nästa kort", hänger alltid med. Prickarna = ren position.
   - Baren drivs av Splides VERKLIGA timer ('autoplay:playing' rate 0→1),
     inte en gissad CSS-varaktighet → kan aldrig drifta/snäppa. rAF-fallback
     om eventet skulle saknas. resetProgress:false → sömlös återupptagning
     efter hover-paus.

   ⚑ Betyg 5,0 · 27 recensioner ägar-bekräftat 2026-07-19.
   ⚑ En av de 27 är 4★ (ej namngiven) — bekräfta att ingen VISAD är den (alla 5★).
   ============================================================ */
html { font-size: 62.5%; box-sizing: border-box; }
*, *::before, *::after { box-sizing: inherit; }
body {
  margin: 0;
  font-family: 'Outfit', sans-serif;
  font-weight: 300;
  font-size: var(--aptext-sm);
  background: var(--color-2, hsl(216 100% 98%));
  color: var(--apmidnight-blue);
  -webkit-font-smoothing: antialiased;
}

.testimonial-a { padding: var(--apspace-2xl) var(--apspace-m); overflow: hidden; }
.testimonial-a__inner { max-width: 1200px; margin: 0 auto; }

/* --- Rubrikpartiet --- */
.testimonial-a__header { text-align: center; max-width: 72rem; margin: 0 auto var(--apspace-l); }
.testimonial-a__heading {
  margin: 0 0 var(--apspace-2xs);
  font-size: var(--aptext-2xl);   /* 36px max, vikt 400 = mindre bold */
  font-weight: 400;
  letter-spacing: -0.01em;
  line-height: 1.15;
  color: var(--apmidnight-blue);
}
.testimonial-a__subline {
  margin: 0;
  font-size: var(--aptext-m);
  font-weight: 300;
  color: rgba(9, 11, 50, 0.68);
}

/* --- Slider --- */
.testimonial-a .splide__track { overflow: visible; }
.testimonial-a .splide { padding-bottom: var(--apspace-2xs); }

/* --- Kortet (låst DNA; citat centrerat, 17–19px) --- */
:root { --card-text-size: clamp(1.7rem, calc(0.21vw + 1.63rem), 1.9rem); }
.card {
  margin: 0;
  display: flex; flex-direction: column;
  min-height: 360px; height: 100%;
  padding: var(--apspace-m) var(--apspace-m) var(--apspace-l);
  border-radius: var(--radius);
  background: linear-gradient(-27deg, #0b0f30 0%, #2d516d 60%);
  color: #fff;
  box-shadow: 0 0 16px 0 rgba(190, 190, 190, 0.14);
  position: relative;
}
.card__top { display: flex; align-items: center; justify-content: space-between; min-height: 2.4rem; }
.card__quote-mark {
  font-size: 5.6rem; line-height: 1;
  font-weight: 600;
  color: var(--apneon-mint);
  opacity: 0.55;
  height: 2.4rem;
  margin-top: -0.4rem;
  user-select: none;
}
.card__google { width: 22px; height: 22px; flex: 0 0 auto; }
.card__body { flex: 1 1 auto; display: flex; align-items: center; padding: var(--apspace-s) 0; }
.card__text {
  margin: 0;
  font-size: var(--card-text-size);
  font-weight: 300;
  line-height: 1.5;
  color: rgba(255, 255, 255, 0.95);
}
.card__foot { flex: 0 0 auto; }
.card__name { margin: 0 0 var(--apspace-2xs); font-size: var(--aptext-ml); font-weight: 600; }
.card__divider { border: 0; border-top: 1px solid rgba(255, 255, 255, 0.14); margin: 0 0 var(--apspace-2xs); }
.card__meta { display: flex; align-items: center; gap: 0.8rem; }
.card__stars { display: inline-flex; gap: 0.3rem; }
.card__stars svg { width: 15px; height: 15px; fill: var(--apneon-mint); }
.card__date { margin-left: auto; font-size: var(--aptext-xs); font-weight: 400; color: rgba(255, 255, 255, 0.72); }

/* --- Prickar = REN positionsmarkör (ingen progress-fyllning längre) --- */
.testimonial-a .splide__pagination { position: static; transform: none; left: auto; margin-top: var(--apspace-2xs); gap: 0.8rem; padding: 0.6rem 0; justify-content: center; }
.testimonial-a .splide__pagination__page {
  width: 2.4rem; height: 0.6rem; border-radius: var(--apradius-full);
  background: #c7d3eb; border: none; opacity: 1; transform: none;
  transition: width .3s ease, background-color .3s ease;
  position: relative; cursor: pointer; padding: 0; margin: 0;
}
/* Osynligt träffområde ≥44px (WCAG 2.5.8) */
.testimonial-a .splide__pagination__page::before {
  content: ""; position: absolute; inset: -1.9rem 0;
}
.testimonial-a .splide__pagination__page.is-active { width: 4.4rem; background: #00ad48; }

/* --- Progress-linje: egen "tid till nästa kort", frame-exakt via JS --rate.
       Sitter direkt under korten (ovanför prickarna via JS-omflytt). --- */
.testimonial-a__progress {
  width: 13rem; height: 0.4rem; margin: var(--apspace-s) auto 0;
  background: #dbe4f2; border-radius: var(--apradius-full); overflow: hidden;
}
.testimonial-a__progress-fill {
  display: block; width: 100%; height: 100%;
  background: linear-gradient(90deg, var(--brightgreen), #00ad48);
  transform: scaleX(0); transform-origin: left center;
  will-change: transform;
}

/* --- Google-betyg: guldstjärnor + svart text, LÄNKAD, ≥44px träffyta --- */
.testimonial-a__rating { display: flex; justify-content: center; margin-top: var(--apspace-s); }
.rating-badge {
  display: inline-flex; align-items: center; gap: 1.1rem;
  min-height: 44px; padding: 0.8rem 1.2rem;
  text-decoration: none; color: inherit; cursor: pointer;
}
.rating-badge:hover .rating-badge__text { text-decoration: underline; text-underline-offset: 4px; }
.rating-badge__stars { display: inline-flex; gap: 0.4rem; }
.rating-badge__stars svg { width: 18px; height: 18px; fill: #fbbc04; }
.rating-badge__text { font-size: var(--aptext-m); font-weight: 300; color: var(--apmidnight-blue); white-space: nowrap; }
.rating-badge__text strong { font-weight: 600; margin-right: 0.9rem; }

/* --- Tablet 760–1024: fullt set, 2-upp (kort ~348px ≈ telefonkort, ingen inversion) --- */
@media (max-width: 1024px) and (min-width: 760px) {
  .testimonial-a { padding: var(--apspace-xl) var(--apspace-m); }
  .card { min-height: 340px; }
}

/* --- Kompakt 1-upp ≤759 (telefoner + små surfplattor): ingen subline, lättare
       rubrik, kort cappat så det inte blir en "billboard" på breda telefoner --- */
@media (max-width: 759px) {
  .testimonial-a { padding: var(--apspace-xl) var(--apspace-s); }
  .testimonial-a__heading { font-size: clamp(2.3rem, 6.4vw, 2.7rem); font-weight: 400; }
  .testimonial-a__subline { display: none; }
  .testimonial-a__header { margin-bottom: 3.2rem; }
  /* 1-upp: fullbredds-kort (Splide räknar bredden själv, ingen peek, robust
     mot Splides translate). Håll höjden tajt så breda telefoner/små plattor
     inte får ett tomt "billboard"-kort. */
  .card { min-height: 300px; }
  .card__body { padding: var(--apspace-xs) 0; }
  .rating-badge__stars svg { width: 17px; height: 17px; }
  .rating-badge__text { font-size: var(--aptext-sm); }
}
</style>
</head>
<body>

<section class="testimonial-a" aria-label="Omdömen från Ampys kunder">
  <div class="testimonial-a__inner">

    <header class="testimonial-a__header">
      <h2 class="testimonial-a__heading">Vad säger dina grannar om Ampy?</h2>
      <p class="testimonial-a__subline">Riktiga omdömen från riktiga jobb.</p>
    </header>

    <div class="splide" id="review-slider" aria-label="Kundomdömen">
      <div class="splide__track">
        <ul class="splide__list"><!-- slides injiceras av JS --></ul>
      </div>
    </div>

    <!-- Progress-linje (tid till nästa kort). aria-hidden: ren dekor. -->
    <div class="testimonial-a__progress" aria-hidden="true"><span class="testimonial-a__progress-fill"></span></div>

    <!-- Google-betyg, LÄNKAD till Ampys Google-profil (samma URL som sajten). -->
    <div class="testimonial-a__rating">
      <a class="rating-badge"
         href="https://www.google.com/maps/place/Ampy/@59.3576299,17.9842061,17z/data=!3m1!4b1!4m6!3m5!1s0x2bec1ce5c4ed9ce9:0xfce1752e84a1bfee!8m2!3d59.3576272!4d17.986781!16s%2Fg%2F11ypjy9rrm"
         target="_blank" rel="noopener" aria-label="Läs Ampys omdömen på Google, öppnas i ny flik">
        <span class="rating-badge__stars" role="img" aria-label="5 av 5 stjärnor">
          <svg viewBox="0 0 24 24"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.9 1.6-7L2 9.2l7.1-.6z"/></svg>
          <svg viewBox="0 0 24 24"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.9 1.6-7L2 9.2l7.1-.6z"/></svg>
          <svg viewBox="0 0 24 24"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.9 1.6-7L2 9.2l7.1-.6z"/></svg>
          <svg viewBox="0 0 24 24"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.9 1.6-7L2 9.2l7.1-.6z"/></svg>
          <svg viewBox="0 0 24 24"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.9 1.6-7L2 9.2l7.1-.6z"/></svg>
        </span>
        <span class="rating-badge__text"><strong>5 av 5</strong>Betyg på Google</span>
      </a>
    </div>

  </div>
</section>

<script src="../shared/splide.min.js"></script>
<script>
/* ÄKTA Google-recensioner, ordagrant ur ägarens fullständiga lista 2026-07-19.
   Fulla profilnamn; datum = månad härledd ur Googles relativa tidsstämpel
   (spot-checka vid go-live). Jan Fernström #2 (fulltext från ägaren).
   Utelämnade (kurering): Niklas Savic + Leon Russo (för långa), Jonas
   ("Gediget arbete och trevliga" = hela recensionen), Axel ("super nöjd!"),
   Daniel Nilsson/AK Athlete/Andrew Broumana (reserv). Thomas/Kristoffer/Maria
   fanns EJ bland Google-recensionerna → borttagna. */
const REVIEWS = [
  { name: "Filip Eriksson", text: "Blev rekommenderad av en granne att gå via Ampy. Är otroligt nöjd med det valet.", date: "mars 2026" },
  { name: "Jan Fernström", text: "Ampy visade sig i konkurrens med andra aktörer både kunnigare och billigare. Genomförandet av offererat arbete skedde inom utlovad tid snabbt och utan problem. Följdfrågor som uppstått efter en tids användning har besvarats kunnigt och utan dröjsmål.", date: "juni 2026" },
  { name: "Daniel Hellström", text: "Professionell firma! Oskar gjorde ett kanonjobb på uppfarten, var en annan firma här tidigare men dem klarade inte av det.", date: "mars 2026" },
  { name: "Mohammed Abduljaleel", text: "Kan verkligen rekommendera Ampy. Trevlig kontakt, punktliga och noggranna. Arbetet blev riktigt bra och priset var rimligt. Kommer definitivt att anlita dom igen i framtiden.", date: "juni 2026" },
  { name: "Alexandra Kamona", text: "Vi är supernöjda med de som installerade vår elbox! Väldigt proffsiga och trevliga att ha att göra med. Rekommenderas varmt!", date: "maj 2026" },
  { name: "Mathias Franzen", text: "Sökte en helhetslösning för hembatteri. Ampy levererade över förväntan. Snabbt, smidigt och tryggt!", date: "mars 2026" },
  { name: "Moa Olaussen", text: "Snabb hjälp när elcentralen strulade. Ampy dök upp direkt och löste allt med högsta precision. Rekommenderas!", date: "mars 2026" },
  { name: "Sofia Hamren", text: "Jättebra och professionell service! Elektrikern förstod direkt vad som behövde göras och utförde arbetet effektivt och med mycket bra resultat. Rekommenderas!", date: "april 2026" },
  { name: "Hugo Grafström Olsson", text: "Från start till mål levererades en service i världsklass!", date: "mars 2026" },
  { name: "Josephine Lundqvist", text: "Fick hjälp med belysningen i hela lägenheten under min renovering. Väldigt nöjd.", date: "maj 2026" },
  { name: "dany Hanna", text: "Supernöjd, bra gäng, trevliga pålitliga och snabba.", date: "juni 2026" },
  { name: "Adam Andersson", text: "Proffsig rådgivning inför vår installation. Känns tryggt att anlita experter.", date: "mars 2026" }
];

/* Kompakt vy (≤759): 4 kurerade (granne / tjänst / batteri / elcentral) → 4 prickar */
const MOBILE_INDICES = [0, 2, 5, 6]; // Filip, Daniel, Mathias, Moa

const STAR = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.9 1.6-7L2 9.2l7.1-.6z"/></svg>';
const slideHTML = r => `
  <li class="splide__slide">
    <figure class="card">
      <div class="card__top">
        <span class="card__quote-mark" aria-hidden="true">“</span>
        <img class="card__google" src="../shared/google-g.svg" alt="Google-omdöme">
      </div>
      <div class="card__body">
        <blockquote class="card__text" style="margin:0">${r.text}</blockquote>
      </div>
      <figcaption class="card__foot">
        <div class="card__name">${r.name}</div>
        <hr class="card__divider">
        <div class="card__meta">
          <span class="card__stars" role="img" aria-label="5 av 5 stjärnor">${STAR.repeat(5)}</span>
          <span class="card__date">${r.date}</span>
        </div>
      </figcaption>
    </figure>
  </li>`;

const list = document.querySelector('.splide__list');
const sliderEl = document.getElementById('review-slider');
const fill = document.querySelector('.testimonial-a__progress-fill');
const INTERVAL = 4000, SPEED = 500;

const mq = window.matchMedia('(max-width: 759px)');
const reduceMQ = window.matchMedia('(prefers-reduced-motion: reduce)');
const perfNow = () => (window.performance && performance.now) ? performance.now() : Date.now();

/* Progress-linjen: en enda fill-nod, scaleX(rate). */
let curRate = 0;
const setRate = r => { curRate = Math.max(0, Math.min(1, r)); fill.style.transform = 'scaleX(' + curRate + ')'; };

let playingEventSeen = false;   // Splide-timern driver → strunta i fallback
let paused = false;             // hover-paus (endast för fallback-loopen)
let cycleStart = 0;             // fallback-timerns nollpunkt

/* Svenska etiketter för Splides paginering/knappar */
const I18N = {
  prev: 'Föregående omdöme', next: 'Nästa omdöme',
  first: 'Första omdömet', last: 'Sista omdömet',
  slideX: 'Gå till omdöme %s', pageX: 'Gå till sida %s',
  slide: 'omdöme', select: 'Välj ett omdöme att visa', slideLabel: '%s av %s'
};

let splide = null;

function build() {
  const mobile = mq.matches;
  const reduce = reduceMQ.matches;
  const data = mobile ? MOBILE_INDICES.map(i => REVIEWS[i]) : REVIEWS;
  if (splide) splide.destroy(true);
  list.innerHTML = data.map(slideHTML).join('');
  splide = new Splide(sliderEl, {
    type: 'slide', perPage: mobile ? 1 : 3, perMove: 1, gap: '24px',
    autoplay: !reduce, interval: INTERVAL, speed: SPEED,
    pauseOnHover: true, pauseOnFocus: true, resetProgress: false,
    rewind: true, arrows: false, pagination: true,
    mediaQuery: 'max', i18n: I18N,
    breakpoints: mobile ? {} : { 1024: { perPage: 2 } }
  }).mount();

  /* Flytta pagineringen (prickarna) NER under progress-linjen så ordningen blir
     kort → tunn tid-linje → positions-prickar → badge (linjen hugger korten). */
  const pag = sliderEl.querySelector('.splide__pagination');
  const progEl = document.querySelector('.testimonial-a__progress');
  if (pag && progEl) progEl.after(pag);

  setRate(0);
  cycleStart = perfNow();

  /* Nollställ linjen vid varje kortbyte + starta om fallback-cykeln */
  splide.on('move', () => { setRate(0); cycleStart = perfNow(); });

  /* Primär: Splides egen timer-rate (frame-exakt). Ingen paus-gate här —
     eventet fyras per definition bara medan autoplay faktiskt spelar, så
     en tappad hover-leave kan aldrig frysa linjen. */
  splide.on('autoplay:playing', rate => { playingEventSeen = true; setRate(rate); });

  if (reduce) setRate(1); /* statisk full linje när autoplay är av */
}

/* Hover-paus enbart för fallback-loopen (matchar Splides egen mouseenter/leave-familj) */
sliderEl.addEventListener('mouseenter', () => { paused = true; });
sliderEl.addEventListener('mouseleave', () => { paused = false; cycleStart = perfNow() - curRate * (INTERVAL + SPEED); });

/* Fallback-loop: driver linjen ENDAST om 'autoplay:playing' aldrig setts.
   Slutar schemalägga sig själv så fort primärvägen bekräftats (ingen evig CPU). */
function rafTick() {
  if (playingEventSeen) return;                 // primärvägen tog över → sluta
  if (splide && !paused && !reduceMQ.matches) {
    setRate((perfNow() - cycleStart) / (INTERVAL + SPEED));
  }
  requestAnimationFrame(rafTick);
}
requestAnimationFrame(rafTick);

/* Snyggare återkomst efter flikbyte: nollställ cykeln (annars ett engångshopp) */
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && splide) { setRate(0); cycleStart = perfNow(); }
});

/* Bygg om vid brytpunktsbyte (kompakt↔fullt) och vid reduced-motion-växling */
mq.addEventListener('change', build);
reduceMQ.addEventListener('change', build);
build();
</script>
</body>
</html>
