<!DOCTYPE html>
<html lang="sv-SE">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ampy Testimonials — Version A (final)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/splide.css">
<style>
/* ============================================================
   VERSION A — "Ren scen" (FINAL, ägar-feedback 2026-07-19)
   Ändringar mot v1:
   1. Rubrik svart, ingen gradient (var: grön highlight på grannar/Ampy).
   2. Subline: "Riktiga omdömen från riktiga jobb." (kortad).
   3. Citat centrerat vertikalt i kortet (var: högt upp) + en gnutta större.
   4. Snabbare autoplay (5s, var 6s).
   5. Proof-rad + "Läs alla omdömen"-länk ERSATT av Google-betyg-badge
      (inget som tar bort användaren från sajten).
   6. Mobil: 4 kurerade omdömen (var: 10) → max 4 prickar.
   ⚑ [GAP] Datum = PLATSHÅLLARE. ⚑ [CANDOUR] "5 av 5 · Betyg på Google"
   måste = aktuellt Google-snitt vid go-live (foretagsdata §5, never-assert-lista).
   ============================================================ */
html { font-size: 62.5%; box-sizing: border-box; }
*, *::before, *::after { box-sizing: inherit; }
body {
  margin: 0;
  font-family: 'Outfit', sans-serif;
  font-weight: 300;
  font-size: var(--aptext-sm);
  background: var(--color-2, hsl(216 100% 98%));
  color: var(--apmidnight-blue);
  -webkit-font-smoothing: antialiased;
}

.testimonial-a { padding: var(--apspace-2xl) var(--apspace-m); overflow: hidden; }
.testimonial-a__inner { max-width: 1200px; margin: 0 auto; }

/* --- Rubrikpartiet --- */
.testimonial-a__header { text-align: center; max-width: 72rem; margin: 0 auto var(--apspace-l); }
.testimonial-a__heading {
  margin: 0 0 var(--apspace-2xs);
  font-size: var(--aptext-2xl);
  font-weight: 600;
  line-height: 1.15;
  color: var(--apmidnight-blue); /* svart, ingen gradient */
}
.testimonial-a__subline {
  margin: 0;
  font-size: var(--aptext-m);
  font-weight: 300;
  color: rgba(9, 11, 50, 0.68);
}

/* --- Slider --- */
.testimonial-a .splide__track { overflow: visible; }
.testimonial-a .splide { padding-bottom: var(--apspace-2xs); }

/* --- Kortet (älskat DNA bevarat; citat centrerat + gnutta större) --- */
.card {
  display: flex; flex-direction: column;
  min-height: 360px; height: 100%;
  padding: var(--apspace-m) var(--apspace-m) var(--apspace-l);
  border-radius: var(--radius);
  background: linear-gradient(-27deg, #0b0f30 0%, #2d516d 60%);
  color: #fff;
  box-shadow: 0 0 16px 0 rgba(190, 190, 190, 0.14);
  position: relative;
}
.card__top { display: flex; align-items: center; justify-content: space-between; min-height: 2.4rem; }
.card__quote-mark {
  font-size: 5.6rem; line-height: 1;
  font-weight: 600;
  color: var(--apneon-mint);
  opacity: 0.55;
  height: 2.4rem;
  margin-top: -0.4rem;
  user-select: none;
}
.card__google { width: 22px; height: 22px; flex: 0 0 auto; }
/* Citatet: fyller mittzonen och centreras vertikalt mellan citattecken och foten */
.card__body { flex: 1 1 auto; display: flex; align-items: center; padding: var(--apspace-s) 0; }
.card__text {
  margin: 0;
  font-size: var(--card-text-size);
  font-weight: 300;
  line-height: 1.5;
  color: rgba(255, 255, 255, 0.95);
}
.card__foot { flex: 0 0 auto; }
.card__name { margin: 0 0 var(--apspace-2xs); font-size: var(--aptext-ml); font-weight: 600; }
.card__divider { border: 0; border-top: 1px solid rgba(255, 255, 255, 0.14); margin: 0 0 var(--apspace-2xs); }
.card__meta { display: flex; align-items: center; gap: 0.8rem; }
.card__stars { display: inline-flex; gap: 0.3rem; }
.card__stars svg { width: 15px; height: 15px; fill: var(--apneon-mint); }
.card__date { margin-left: auto; font-size: var(--aptext-xs); font-weight: 400; color: rgba(255, 255, 255, 0.72); }

/* "en gnutta större" än aptext-m (16–18px): 17–19px */
:root { --card-text-size: clamp(1.7rem, calc(0.21vw + 1.63rem), 1.9rem); }

/* --- Paginering + progress-bar (snabbare, alla prickar) --- */
.testimonial-a .splide__pagination { position: static; transform: none; left: auto; margin-top: var(--apspace-s); gap: 0.8rem; padding: 0.6rem 0; justify-content: center; }
.testimonial-a .splide__pagination__page {
  width: 2.4rem; height: 0.6rem; border-radius: var(--apradius-full);
  background: #c7d3eb; border: none; opacity: 1; transform: none;
  transition: width .3s ease, background-color .3s ease;
  position: relative; overflow: visible; cursor: pointer;
  padding: 0; margin: 0;
}
/* Osynligt träffområde ≥44px så prickarna når WCAG 2.5.8 utan att ändra den synliga stapeln */
.testimonial-a .splide__pagination__page::before {
  content: ""; position: absolute; inset: -1.9rem 0; z-index: 1;
}
.testimonial-a .splide__pagination__page.is-active { width: 4.4rem; background: #cfe9d9; }
.testimonial-a .splide__pagination__page.is-active::after {
  content: ""; position: absolute; inset: 0; width: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--brightgreen), #00ad48);
  transform: scaleX(0); transform-origin: left center;
  animation: pageLoad var(--page-duration, 5500ms) linear forwards;
}
.testimonial-a .splide__pagination__page.is-active.paused::after { animation-play-state: paused; }
@keyframes pageLoad { from { transform: scaleX(0); } to { transform: scaleX(1); } }

/* --- Google-betyg-badge (bifogat 2; ersätter proof-rad + länk) --- */
.testimonial-a__rating { display: flex; justify-content: center; margin-top: var(--apspace-m); }
.rating-badge {
  display: inline-flex; align-items: center; gap: 0.8rem;
  padding: 1rem 1.8rem;
  border-radius: var(--apradius-full);
  background: #0b0f30;
  box-shadow: 0 4px 16px rgba(9, 11, 50, 0.14);
}
.rating-badge__stars { display: inline-flex; gap: 0.3rem; }
.rating-badge__stars svg { width: 16px; height: 16px; fill: #fbbc04; }
.rating-badge__text { font-size: var(--aptext-sm); font-weight: 300; color: rgba(255, 255, 255, 0.92); white-space: nowrap; }
.rating-badge__text strong { font-weight: 600; color: #fff; }
.rating-badge__sep { margin: 0 0.5rem; opacity: 0.5; }

@media (max-width: 820px) {
  .testimonial-a { padding: var(--apspace-xl) var(--apspace-s); }
  .testimonial-a__heading { font-size: var(--aptext-xl); }
  .testimonial-a__subline { font-size: var(--aptext-sm); }
  .card { min-height: 288px; }
  .card__body { padding: var(--apspace-xs) 0; }
}
@media (prefers-reduced-motion: reduce) {
  .testimonial-a .splide__pagination__page.is-active::after { animation: none; }
}
</style>
</head>
<body>

<section class="testimonial-a" aria-label="Omdömen från Ampys kunder">
  <div class="testimonial-a__inner">

    <header class="testimonial-a__header">
      <h2 class="testimonial-a__heading">Vad säger dina grannar om Ampy?</h2>
      <p class="testimonial-a__subline">Riktiga omdömen från riktiga jobb.</p>
    </header>

    <div class="splide" id="review-slider" aria-label="Kundomdömen">
      <div class="splide__track">
        <ul class="splide__list"><!-- slides injiceras av JS --></ul>
      </div>
    </div>

    <!-- Google-betyg-badge (bifogat 2). ⚑ [CANDOUR] "5 av 5" måste = aktuellt Google-snitt vid go-live. -->
    <div class="testimonial-a__rating">
      <span class="rating-badge">
        <span class="rating-badge__stars" role="img" aria-label="5 av 5 stjärnor">
          <svg viewBox="0 0 24 24"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.9 1.6-7L2 9.2l7.1-.6z"/></svg>
          <svg viewBox="0 0 24 24"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.9 1.6-7L2 9.2l7.1-.6z"/></svg>
          <svg viewBox="0 0 24 24"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.9 1.6-7L2 9.2l7.1-.6z"/></svg>
          <svg viewBox="0 0 24 24"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.9 1.6-7L2 9.2l7.1-.6z"/></svg>
          <svg viewBox="0 0 24 24"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.9 1.6-7L2 9.2l7.1-.6z"/></svg>
        </span>
        <span class="rating-badge__text"><strong>5 av 5</strong><span class="rating-badge__sep">·</span>Betyg på Google</span>
      </span>
    </div>

  </div>
</section>

<script src="../shared/splide.min.js"></script>
<script>
/* Riktiga citat från ampy.se (Google-recensioner, ordagrant).
   ⚑ [GAP] date-fälten är PLATSHÅLLARE — ersätt med riktiga datum från Google-profilen.
   Jonas (avhugget citat på live) utelämnad tills fulltexten finns. */
const REVIEWS = [
  { name: "Filip", text: "Blev rekommenderad av en granne att gå via Ampy. Är otroligt nöjd med det valet!", date: "juni 2026" },
  { name: "Thomas", text: "Behövde en elektriker för flera installationer hemma. Bra pris, snabb utryckning och hög kvalitet!", date: "juni 2026" },
  { name: "Daniel", text: "Professionell firma! Oskar gjorde ett kanonjobb på uppfarten, var en annan firma här tidigare men dem klarade inte av det.", date: "maj 2026" },
  { name: "Mathias", text: "Sökte en helhetslösning för hembatteri. Ampy levererade över förväntan. Snabbt, smidigt och tryggt!", date: "maj 2026" },
  { name: "Kristoffer", text: "Bästa elektrikern vi anlitat! Otroligt noggranna med detaljerna och städade till och med efter sig. Mycket nöjd kund.", date: "april 2026" },
  { name: "Adam", text: "Proffsig rådgivning inför vår installation. Känns tryggt att anlita experter.", date: "april 2026" },
  { name: "Moa", text: "Snabb hjälp när elcentralen strulade. Ampy dök upp direkt och löste allt med högsta precision. Rekommenderas!", date: "mars 2026" },
  { name: "Maria", text: "Hade hört gott om Ampy och de gjorde mig inte besviken. Kvalitet, transparens och bra pris i ett och samma paket!", date: "mars 2026" },
  { name: "Josephine", text: "Fick hjälp med belysningen i hela lägenheten under min renovering. Väldigt nöjd.", date: "februari 2026" },
  { name: "Sofia", text: "Jättebra och professionell service! Elektrikern förstod direkt vad som behövde göras och utförde arbetet effektivt och med mycket bra resultat.", date: "februari 2026" }
];

/* Mobil: 4 kurerade omdömen (max 4 prickar). Spridning: granne-referral, tjänst/konkurrent,
   batteri, elcentral. ⚑ [GAP] ägaren kan välja andra 4 om önskas. */
const MOBILE_INDICES = [0, 2, 3, 6]; // Filip, Daniel, Mathias, Moa

const STAR = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.9 1.6-7L2 9.2l7.1-.6z"/></svg>';
const slideHTML = r => `
  <li class="splide__slide">
    <figure class="card" style="margin:0">
      <div class="card__top">
        <span class="card__quote-mark" aria-hidden="true">“</span>
        <img class="card__google" src="../shared/google-g.svg" alt="Google-omdöme">
      </div>
      <div class="card__body">
        <blockquote class="card__text" style="margin:0">${r.text}</blockquote>
      </div>
      <figcaption class="card__foot">
        <div class="card__name">${r.name}</div>
        <hr class="card__divider">
        <div class="card__meta">
          <span class="card__stars" role="img" aria-label="5 av 5 stjärnor">${STAR.repeat(5)}</span>
          <span class="card__date">${r.date}</span>
        </div>
      </figcaption>
    </figure>
  </li>`;

const list = document.querySelector('.splide__list');
const sliderEl = document.getElementById('review-slider');
const INTERVAL = 5000, SPEED = 500;           // snabbare tempo (var 6000)
sliderEl.style.setProperty('--page-duration', (INTERVAL + SPEED) + 'ms');

const restart = () => {
  const b = sliderEl.querySelector('.splide__pagination__page.is-active');
  if (!b) return;
  b.style.animation = 'none'; void b.offsetWidth; b.style.animation = '';
};
/* Hover-paus: bind EN gång (överlever ombyggnad) */
sliderEl.addEventListener('mouseenter', () => {
  const b = sliderEl.querySelector('.splide__pagination__page.is-active');
  if (b) b.classList.add('paused');
});
sliderEl.addEventListener('mouseleave', () => {
  const b = sliderEl.querySelector('.splide__pagination__page.is-active');
  if (b) b.classList.remove('paused');
});

let splide = null;
const mq = window.matchMedia('(max-width: 820px)');

/* Svenska etiketter för Splides paginering/knappar (sidan är lang="sv-SE") */
const I18N = {
  prev: 'Föregående omdöme', next: 'Nästa omdöme',
  first: 'Första omdömet', last: 'Sista omdömet',
  slideX: 'Gå till omdöme %s', pageX: 'Gå till sida %s',
  slide: 'omdöme', select: 'Välj ett omdöme att visa', slideLabel: '%s av %s'
};

function build() {
  const mobile = mq.matches;
  /* Respektera reduced-motion: ingen autoplay (inte bara död progress-CSS) */
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const data = mobile ? MOBILE_INDICES.map(i => REVIEWS[i]) : REVIEWS;
  if (splide) splide.destroy(true);
  list.innerHTML = data.map(slideHTML).join('');
  splide = new Splide(sliderEl, {
    /* perMove = perPage → prickar, kortförflyttning och progress-bar synkar 1:1 */
    type: 'slide', perPage: mobile ? 1 : 3, perMove: mobile ? 1 : 3, gap: '24px',
    autoplay: !reduce, interval: INTERVAL, speed: SPEED,
    pauseOnHover: true, rewind: true, arrows: false, pagination: true,
    mediaQuery: 'max', i18n: I18N,
    breakpoints: mobile ? {} : { 1024: { perPage: 2, perMove: 2 } }
  }).mount();
  splide.on('move', restart);
  restart();
}

mq.addEventListener('change', build);
build();
</script>
</body>
</html>
